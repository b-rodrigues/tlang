name: Deploy Documentation and Demos

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tlang repository
        uses: actions/checkout@v4
        with:
          path: tlang

      - name: Checkout t_demos repository
        uses: actions/checkout@v4
        with:
          repository: b-rodrigues/t_demos
          path: t_demos

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build Demos and Docs
        run: |
          export TLANG_ROOT="${GITHUB_WORKSPACE}/tlang"
          export DEMOS_ROOT="${GITHUB_WORKSPACE}/t_demos"
          cd ${DEMOS_ROOT}
          bash rebuild_demos_site.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: tlang/docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
