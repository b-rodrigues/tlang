name: Dynamic Pipeline Demo CI

on:
  push:
    branches: [main, master, eager_eval, release-*]
  pull_request:
    branches: [main, master, eager_eval]

jobs:
  run-dynamic-pipeline-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tlang (Current PR/Branch)
        uses: actions/checkout@v4

      - name: Checkout t_demos (latest master)
        uses: actions/checkout@v4
        with:
          repository: b-rodrigues/t_demos
          path: t_demos
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: rstats-on-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # Skip push if the secret is missing (e.g. fork PRs)
          skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Build T Language Engine
        run: |
          nix build .#default -o result_t
          echo "T_BIN=$(pwd)/result_t/bin/t" >> $GITHUB_ENV

      - name: Run Dynamic Pipeline Demo
        run: |
          # The demo assumes t is in the path or as result link in tlang root.
          # Here we run it using the built binary.
          cd t_demos/dynamic_pipeline_operator_t/src
          $T_BIN run --unsafe pipeline.t

      - name: Verify Build Status
        run: |
          if [ $? -eq 0 ]; then
            echo "✓ Dynamic Pipeline Demo passed successfully with the current tlang codebase."
          else
            echo "✖ Dynamic Pipeline Demo failed. Potential regression in eager evaluation logic."
            exit 1
          fi
