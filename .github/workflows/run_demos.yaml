name: Trigger and Validate Demos

on:
  push:
    branches: [main, master, eager_eval, release-*]
  pull_request:
    branches: [main, master, eager_eval]

jobs:
  validate-dynamic-pipeline:
    name: Validate Dynamic Pipeline (Integrated)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tlang (Current PR/Branch)
        uses: actions/checkout@v4

      - name: Checkout t_demos (latest master)
        uses: actions/checkout@v4
        with:
          repository: b-rodrigues/t_demos
          path: t_demos
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: rstats-on-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Build T Language Engine
        run: |
          nix build .#default -o result_t
          echo "export T_BIN=$(pwd)/result_t/bin/t" >> $GITHUB_ENV

      - name: Run Dynamic Pipeline Demo
        run: |
          cd t_demos/dynamic_pipeline_operator_t/src
          $T_BIN run --unsafe pipeline.t

  trigger-demo-rebuild:
    name: Dispatch Site Rebuild to t_demos
    # Only dispatch for master/main pushes to avoid rebuilding the site for every small PR commit
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch event to t_demos
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.TRIGGER_DEMOS }}" \
            https://api.github.com/repos/b-rodrigues/t_demos/dispatches \
            -d '{"event_type": "trigger-demo", "client_payload": {"ref": "${GITHUB_REF}"}}'
