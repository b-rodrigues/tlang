name: Trigger Demo Actions

on:
  push:
  pull_request:

jobs:
  trigger-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch event to t_demos
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_DEMOS }}
          REPO: ${{ github.event.pull_request.head.repo.full_name != '' && github.event.pull_request.head.repo.full_name || github.repository }}
          SHA: ${{ github.event.pull_request.head.sha != '' && github.event.pull_request.head.sha || github.sha }}
        run: |
          gh api repos/b-rodrigues/t_demos/dispatches \
            --method POST \
            --field event_type=trigger-demo \
            --field client_payload[repo]="$REPO" \
            --field client_payload[sha]="$SHA"
