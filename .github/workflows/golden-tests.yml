name: Golden Tests (T vs R)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Golden tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrhi1JzhBnXv7aWI6+F0=
    
    - name: Setup Cachix (for R packages)
      uses: cachix/cachix-action@v13
      with:
        name: rstats-on-nix
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        skipPush: true
    
    - name: Build T
      run: nix develop --accept-flake-config --command dune build
    
    - name: Generate test data (R datasets)
      run: nix develop --accept-flake-config --command make golden-data
    
    - name: Generate expected outputs (R/dplyr)
      run: nix develop --accept-flake-config --command make golden-expected
    
    - name: Run T test scripts
      run: nix develop --accept-flake-config --command make golden-run
    
    - name: Compare outputs (testthat)
      run: nix develop --accept-flake-config --command make golden-compare
    
