name: Test Build Matrix

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        system:
          - x86_64-linux
          - aarch64-linux
          - aarch64-darwin
    runs-on: ${{ contains(matrix.system, 'darwin') && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            cores = 1
            max-jobs = 1

      - name: Build default package
        run: nix build .#default --print-build-logs

      - name: Build devShell profile (materialises all buildInputs)
        run: nix develop .#default --profile dev-shell-profile --command true
