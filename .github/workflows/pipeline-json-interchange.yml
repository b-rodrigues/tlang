name: Pipeline JSON Interchange E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  json-interchange-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrhi1JzhBnXv7aWI6+F0=

    - name: Setup Cachix
      uses: cachix/cachix-action@v13
      with:
        name: rstats-on-nix
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        skipPush: true

    - name: Initialize and Run JSON Interchange Pipeline
      env:
        TLANG_FLAKE_URL: git+file://${{ github.workspace }}
      run: |
        # 1. Build T from current commit
        nix build .#default --accept-flake-config
        TLANG_BIN=$(pwd)/result/bin/t
        
        # 2. Create a clean workspace
        cd ..
        mkdir json_test_workspace
        cd json_test_workspace
        
        # 3. Initialize a new project
        $TLANG_BIN init project json_project --no-git
        cd json_project
        
        # 4. Configure Project dependencies
        printf '%s\n' \
          '[project]' \
          'name = "json_project"' \
          '' \
          '[dependencies]' \
          '' \
          '[r-dependencies]' \
          'packages = ["jsonlite"]' \
          > tproject.toml

        # 5. Sync dependencies
        $TLANG_BIN update
        
        # 6. Prepare Test Script
        cp ${{ github.workspace }}/tests/pipeline/test_json_interchange.t .

        # 7. Run the pipeline
        nix develop --accept-flake-config --command $TLANG_BIN run test_json_interchange.t --unsafe

    - name: Verify Results
      run: |
        TLANG_BIN=$(pwd)/result/bin/t
        cd ../json_test_workspace/json_project
        echo "=== Verifying artifacts ==="
        nix develop --accept-flake-config --command $TLANG_BIN --unsafe <<'EOF'
        final = read_node("final_node")
        print("Final node value:")
        print(final)
        
        -- Expected: (0.1 + 2) * 2 = 4.2
        if (abs(final - 4.2) < 0.001) {
            print("JSON interchange verified!")
        } else {
            print("ERROR: Result mismatch")
            exit(1)
        }
        EOF
