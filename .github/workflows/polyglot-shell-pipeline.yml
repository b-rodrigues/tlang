name: Polyglot Shell Pipeline E2E

on:
  workflow_run:
    workflows: ["Build and Cache"]
    types:
      - completed
  workflow_dispatch:


jobs:
  polyglot-shell-e2e:
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrhi1JzhBnXv7aWI6+F0=

    - name: Setup Cachix
      uses: cachix/cachix-action@v13
      with:
        name: rstats-on-nix
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        skipPush: true

    - name: Initialize and Run Polyglot Shell Pipeline
      env:
        TLANG_FLAKE_URL: git+file://${{ github.workspace }}
      run: |
        nix build .#default --accept-flake-config
        TLANG_BIN=$(pwd)/result/bin/t

        cd ..
        mkdir polyglot_shell_workspace
        cd polyglot_shell_workspace

        $TLANG_BIN init --project polyglot_shell_project --no-git
        cd polyglot_shell_project

        printf '%s\n' \
          '[project]' \
          'name = "polyglot_shell_project"' \
          'description = "A T pipeline exercising T, R, Python, and sh runtimes"' \
          '' \
          '[dependencies]' \
          '' \
          '[r-dependencies]' \
          'packages = ["dplyr", "readr"]' \
          '' \
          '[py-dependencies]' \
          'version = "python314"' \
          'packages = ["pandas"]' \
          '' \
          '[t]' \
          'min_version = "0.5.0"' \
          > tproject.toml

        $TLANG_BIN update

        cp ${{ github.workspace }}/tests/pipeline/polyglot_shell_pipeline.t .
        cp ${{ github.workspace }}/tests/pipeline/verify_polyglot_shell_pipeline.t .
        cp ${{ github.workspace }}/tests/pipeline/iolib.t .
        cp ${{ github.workspace }}/tests/pipeline/iolib.R .
        cp ${{ github.workspace }}/tests/pipeline/iolib.py .
        mkdir -p tests/pipeline/data
        cp ${{ github.workspace }}/tests/pipeline/data/mtcars.csv tests/pipeline/data/

        sed -i 's|functions = "tests/pipeline/iolib.t"|functions = "iolib.t"|' polyglot_shell_pipeline.t
        sed -i 's|functions = "tests/pipeline/iolib.R"|functions = "iolib.R"|' polyglot_shell_pipeline.t
        sed -i 's|functions = "tests/pipeline/iolib.py"|functions = "iolib.py"|' polyglot_shell_pipeline.t

        echo "--- polyglot_shell_pipeline.t ---"
        cat polyglot_shell_pipeline.t

        nix develop --accept-flake-config --command $TLANG_BIN run polyglot_shell_pipeline.t --unsafe

        echo "=== _pipeline/pipeline.nix ==="
        cat _pipeline/pipeline.nix
        echo ""
        echo "=== _pipeline/dag.json ==="
        cat _pipeline/dag.json

    - name: Verify shell report artifact
      run: |
        TLANG_BIN=$(pwd)/result/bin/t
        cd ../polyglot_shell_workspace/polyglot_shell_project
        nix develop --accept-flake-config --command $TLANG_BIN run verify_polyglot_shell_pipeline.t --unsafe
