name: Pipeline PMML Interchange E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pmml-interchange-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrhi1JzhBnXv7aWI6+F0=

    - name: Setup Cachix
      uses: cachix/cachix-action@v13
      with:
        name: rstats-on-nix
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        skipPush: true

    - name: Initialize and Run PMML Interchange Pipeline
      env:
        TLANG_FLAKE_URL: git+file://${{ github.workspace }}
      run: |
        # 1. Build T from current commit
        nix build .#default --accept-flake-config
        TLANG_BIN=$(pwd)/result/bin/t
        
        # 2. Create a clean workspace
        cd ..
        mkdir pmml_test_workspace
        cd pmml_test_workspace
        
        # 3. Initialize a new project
        "$TLANG_BIN" init --project pmml_project --no-git
        cd pmml_project
        
        # 4. Configure Project dependencies
        printf '%s\n' \
          '[project]' \
          'name = "pmml_project"' \
          '' \
          '[dependencies]' \
          '' \
          '[r-dependencies]' \
          'packages = ["r2pmml"]' \
          '' \
          '[python-dependencies]' \
          'packages = ["pandas", "scikit-learn", "sklearn2pmml", "scipy"]' \
          > tproject.toml

        # 5. Sync dependencies
        "$TLANG_BIN" update
        
        # 6. Prepare Test Script and Data
        cp ${{ github.workspace }}/tests/pipeline/test_pmml_interchange.t .
        mkdir -p data
        cp ${{ github.workspace }}/tests/pipeline/data/mtcars.csv data/mtcars.csv

        # 7. Run the pipeline
        nix develop --accept-flake-config --command "$TLANG_BIN" run test_pmml_interchange.t --unsafe

    - name: Verify Results
      run: |
        TLANG_BIN=$(pwd)/result/bin/t
        cd ../pmml_test_workspace/pmml_project
        echo "=== Verifying Artifacts in T REPL ==="
        nix develop --accept-flake-config --command "$TLANG_BIN" --unsafe <<'EOF'
        print("\n--- Verifying R PMML Interchange (model_node) ---")
        model_r = read_node("model_node")
        print("Tidy Coefficient Summary:")
        summary(model_r)
        print("Model Fit Statistics:")
        fit_stats(model_r)
        
        results_r = read_node("preds_node")
        print("Predictions from R Model:")
        print(head(results_r))
        
        print("\n--- Verifying Python PMML Interchange (model_py_node) ---")
        model_py = read_node("model_py_node")
        print("Tidy Coefficient Summary:")
        summary(model_py)
        print("Model Fit Statistics:")
        fit_stats(model_py)
        
        results_py = read_node("preds_py_node")
        print("Predictions from Python Model:")
        print(head(results_py))
        
        expected_val = 23.5723
        val_r = get(results_r, 0)
        val_py = get(results_py, 0)
        
        if (abs(val_r - expected_val) < 0.01) {
            print("\nSUCCESS: R PMML interchange verified!")
        } else {
            print("\nERROR: R Prediction mismatch")
            exit(1)
        }
        
        if (abs(val_py - expected_val) < 0.01) {
            print("SUCCESS: Python PMML interchange verified!")
        } else {
            print("ERROR: Python Prediction mismatch")
            exit(1)
        }
        EOF
