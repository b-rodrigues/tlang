name: Pipeline PMML Interchange E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pmml-interchange-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Nix
      uses: cachix/install-nix-action@v24
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrhi1JzhBnXv7aWI6+F0=

    - name: Setup Cachix
      uses: cachix/cachix-action@v13
      with:
        name: rstats-on-nix
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        skipPush: true

    - name: Initialize and Run PMML Interchange Pipeline
      env:
        TLANG_FLAKE_URL: git+file://${{ github.workspace }}
      run: |
        # 1. Build T from current commit
        nix build .#default --accept-flake-config
        TLANG_BIN=$(pwd)/result/bin/t
        
        # 2. Create a clean workspace
        cd ..
        mkdir pmml_test_workspace
        cd pmml_test_workspace
        
        # 3. Initialize a new project
        $TLANG_BIN init project pmml_project --no-git
        cd pmml_project
        
        # 4. Configure Project dependencies
        printf '%s\n' \
          '[project]' \
          'name = "pmml_project"' \
          '' \
          '[dependencies]' \
          '' \
          '[r-dependencies]' \
          'packages = ["r2pmml"]' \
          '' \
          '[python-dependencies]' \
          'packages = ["pandas", "scikit-learn", "sklearn2pmml", "scipy"]' \
          > tproject.toml

        # 5. Sync dependencies
        $TLANG_BIN update
        
        # 6. Prepare Test Script and Data
        cp ${{ github.workspace }}/tests/pipeline/test_pmml_interchange.t .
        mkdir -p data
        curl -L https://raw.githubusercontent.com/b-rodrigues/rixpress_demos/refs/heads/master/basic_r/data/mtcars.csv -o data/mtcars.csv

        # 7. Run the pipeline
        nix develop --accept-flake-config --command $TLANG_BIN run test_pmml_interchange.t --unsafe

    - name: Verify Results
      run: |
        TLANG_BIN=$(pwd)/result/bin/t
        cd ../pmml_test_workspace/pmml_project
        echo "=== Verifying Artifacts in T REPL ==="
        echo "Loading model_node and preds_node to verify PMML interchange..."
        nix develop --accept-flake-config --command $TLANG_BIN --unsafe <<'EOF'
        print("--- Node: model_node ---")
        model = read_node("model_node")
        print("Model Object (Raw):")
        model
        
        print("\nTidy Coefficient Summary (broom::tidy equivalent):")
        summary(model)
        
        print("\nModel Fit Statistics (broom::glance equivalent):")
        fit_stats(model)
        
        print("\n--- Node: preds_node ---")
        results = read_node("preds_node")
        print("Native T Predictions using PMML Coefficients from model_node:")
        print(results)
        
        expected = [23.5723, 22.5834, 25.2758]
        if (abs(get(results, 0) - get(expected, 0)) < 0.01) {
            print("\nSUCCESS: PMML interchange verified! Native T predictions match R model.")
        } else {
            print("\nERROR: Prediction mismatch")
            exit(1)
        }
        EOF
