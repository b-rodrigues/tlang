name: Arrow Native Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  arrow-native:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TLANG_REQUIRE_ARROW_NATIVE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrhi1JzhBnXv7aWI6+F0=

      - name: Setup Cachix (for R packages)
        uses: cachix/cachix-action@v13
        with:
          name: rstats-on-nix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true

      - name: Run Arrow native validation
        run: |
          nix develop --accept-flake-config --command bash -lc '
            dune build tests/docs.json tests/test_arrow_native_runner.exe
            ./_build/default/tests/test_arrow_native_runner.exe
          '
