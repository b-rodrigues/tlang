name: Pipeline Arrow Interop E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  arrow-interop-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Nix
      uses: cachix/install-nix-action@v24
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrhi1JzhBnXv7aWI6+F0=

    - name: Setup Cachix
      uses: cachix/cachix-action@v13
      with:
        name: rstats-on-nix
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        skipPush: true

    - name: Initialize and Run Arrow Interop Pipeline
      env:
        TLANG_FLAKE_URL: git+file://${{ github.workspace }}
      run: |
        # 1. Build T from current commit
        nix build .#default --accept-flake-config
        TLANG_BIN=$(pwd)/result/bin/t
        
        # 2. Create a clean workspace
        cd ..
        mkdir arrow_test_workspace
        cd arrow_test_workspace
        
        # 3. Initialize a new project
        $TLANG_BIN init project arrow_project --no-git
        cd arrow_project
        
        # 4. Configure Project dependencies
        printf '%s\n' \
          '[project]' \
          'name = "arrow_project"' \
          '' \
          '[dependencies]' \
          '' \
          '[r-dependencies]' \
          'packages = ["arrow"]' \
          '' \
          '[py-dependencies]' \
          'packages = ["pandas", "pyarrow"]' \
          > tproject.toml

        # 5. Sync dependencies
        $TLANG_BIN update
        
        # 6. Prepare Test Script
        cp ${{ github.workspace }}/tests/pipeline/test_arrow_interop.t .

        # 7. Run the pipeline
        nix develop --accept-flake-config --command $TLANG_BIN run test_arrow_interop.t --unsafe

    - name: Verify Results
      run: |
        TLANG_BIN=$(pwd)/result/bin/t
        cd ../arrow_test_workspace/arrow_project
        echo "=== Verifying Artifacts in T REPL ==="
        nix develop --accept-flake-config --command $TLANG_BIN --unsafe <<'EOF'
        df = read_node("df_py")
        print("--- Node: df_py ---")
        print("Raw Value:")
        print(df)
        print("\nDataFrame Inspection:")
        glimpse(df)
        
        -- Check if we have the expected column and row count
        if (nrow(df) == 5) {
            print("\nRow count verified: 5")
        } else {
            print("\nERROR: Row count mismatch")
            exit(1)
        }
        
        if ("val" in colnames(df)) {
             print("Column 'val' found")
        } else {
             print("ERROR: Column 'val' missing")
             exit(1)
        }
        EOF
