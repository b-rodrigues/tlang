name: Pipeline Multi-Deserializer Map E2E
env:
  TLANG_AUTO_ADD_PIPELINE_DEPS: "1"

on:
  workflow_run:
    workflows: ["Build and Cache"]
    types:
      - completed
  pull_request:
  workflow_dispatch:


jobs:
  multi-deserializer-e2e:
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrhi1JzhBnXv7aWI6+F0=

    - name: Setup Cachix
      uses: cachix/cachix-action@v13
      with:
        name: rstats-on-nix
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        skipPush: true

    - name: Initialize and Run Multi-Deserializer Pipeline
      env:
        TLANG_FLAKE_URL: git+file://${{ github.workspace }}
      run: |
        # 1. Build T from current commit
        nix build .#default --accept-flake-config
        TLANG_BIN=$(pwd)/result/bin/t
        
        # 2. Create a clean workspace
        cd ..
        mkdir multi_des_workspace
        cd multi_des_workspace
        
        # 3. Initialize a new project
        "$TLANG_BIN" init --project multi_des_project --no-git
        cd multi_des_project
        
        # 4. Configure Project dependencies
        printf '%s\n' \
          '[project]' \
          'name = "multi_des_project"' \
          '' \
          '[dependencies]' \
          '' \
          '[r-dependencies]' \
          'packages = ["r2pmml"]' \
          '' \
          '[python-dependencies]' \
          'packages = ["pandas"]' \
          > tproject.toml

        # 5. Sync dependencies
        "$TLANG_BIN" update
        
        # 6. Prepare Test Script
        cp ${{ github.workspace }}/tests/pipeline/test_multi_deserializer.t .

        # 7. Run the pipeline
        nix develop --accept-flake-config --command "$TLANG_BIN" run test_multi_deserializer.t --unsafe

    - name: Verify Results
      run: |
        TLANG_BIN=$(pwd)/result/bin/t
        cd ../multi_des_workspace/multi_des_project
        echo "=== Verifying Artifacts in T REPL ==="
        nix develop --accept-flake-config --command "$TLANG_BIN" --unsafe <<'EOF'
        print("\n--- Verifying Multi-Deserializer Node Result ---")
        
        print("Data from Python (via read_node):")
        data = read_node("data_node")
        print(data)
        
        print("\nModel from R (via read_node):")
        model = read_node("model_node")
        print("Coefficients:", model.coefficients)
        
        combined = read_node("combined_node")
        print("\nFinal Result from combined_node:", combined)
        
        if (combined == "SUCCESS") {
            print("\nSUCCESS: Multi-deserializer map integration verified!")
        } else {
            print("\nERROR: Combined node did not return SUCCESS, got:", combined)
            exit(1)
        }
        EOF
