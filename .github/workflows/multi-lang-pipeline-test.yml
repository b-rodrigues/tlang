name: Multi-Language Pipeline E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  multi-lang-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Nix
      uses: cachix/install-nix-action@v24
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrhi1JzhBnXv7aWI6+F0=

    - name: Setup Cachix
      uses: cachix/cachix-action@v13
      with:
        name: rstats-on-nix
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        skipPush: true

    - name: Initialize and Run Multi-Language Pipeline
      env:
        TLANG_FLAKE_URL: git+file://${{ github.workspace }}
      run: |
        # 1. Build T from current commit first (we need the binary with our fix)
        nix build .#default --accept-flake-config
        TLANG_BIN=$(pwd)/result/bin/t
        
        # 2. Create a clean workspace outside the git repo
        cd ..
        mkdir pipeline_test_workspace
        cd pipeline_test_workspace
        
        # 3. Initialize a new project
        $TLANG_BIN init project my_t_project --no-git
        cd my_t_project
        
        # 4. Configure Project dependencies
        printf '%s\n' \
          '[project]' \
          'name = "my_t_project"' \
          'description = "A multi-language T data analysis project"' \
          '' \
          '[dependencies]' \
          '' \
          '[r-dependencies]' \
          'packages = ["dplyr", "readr"]' \
          '' \
          '[py-dependencies]' \
          'version = "python314"' \
          'packages = ["pandas"]' \
          '' \
          '[t]' \
          'min_version = "0.5.0"' \
          > tproject.toml

        # 5. Debug Project Configuration BEFORE sync
        echo "=== tproject.toml ==="
        cat tproject.toml
        echo ""
        echo "=== flake.nix (initial) ==="
        cat flake.nix
        
        # 6. Sync dependencies and point t-lang to our local checkout
        # The TLANG_FLAKE_URL env var ensures t-lang.url points to our local repo
        $TLANG_BIN update
        
        echo "=== flake.nix (after update) ==="
        cat flake.nix
        
        # 7. Prepare Glue Scripts and Data
        cp ${{ github.workspace }}/tests/pipeline/multi_lang_pipeline.t .
        cp ${{ github.workspace }}/tests/pipeline/iolib.R .
        cp ${{ github.workspace }}/tests/pipeline/iolib.py .
        mkdir -p tests/pipeline/data
        cp ${{ github.workspace }}/tests/pipeline/data/mtcars.csv tests/pipeline/data/

        # Update the pipeline script to use local paths
        sed -i 's|functions = "tests/pipeline/iolib.R"|functions = "iolib.R"|' multi_lang_pipeline.t
        sed -i 's|functions = "tests/pipeline/iolib.py"|functions = "iolib.py"|' multi_lang_pipeline.t

        echo "--- multi_lang_pipeline.t ---"
        cat multi_lang_pipeline.t

        # 8. Run the pipeline
        nix develop --accept-flake-config --command $TLANG_BIN run multi_lang_pipeline.t

    - name: Verify Results in T REPL
      run: |
        TLANG_BIN=$(pwd)/result/bin/t
        cd ../pipeline_test_workspace/my_t_project
        echo "=== Inspecting artifacts via T REPL ==="
        nix develop --accept-flake-config --command $TLANG_BIN --unsafe <<'EOF'
        print("--- Node: summary_r ---")
        read_node("summary_r") |> print
        print("\n--- Node: summary_py ---")
        read_node("summary_py") |> print
        print("\n--- Node: final_results ---")
        read_node("final_results") |> print
        EOF

    - name: Upload pipeline artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: multi-lang-pipeline-results
        path: ../pipeline_test_workspace/my_t_project/_pipeline/
        retention-days: 7
