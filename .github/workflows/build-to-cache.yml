name: Build and Cache
on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 3 * * *'
jobs:
  build:
    strategy:
      matrix:
        system:
          - x86_64-linux
          - aarch64-linux
          - aarch64-darwin
    runs-on: ${{ contains(matrix.system, 'darwin') && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            cores = 1
            max-jobs = 1

      - uses: cachix/cachix-action@v15
        with:
          name: rstats-on-nix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build default package
        run: nix build .#default --print-build-logs

      - name: Build devShell profile (materialises all buildInputs)
        run: nix develop .#default --profile dev-shell-profile --command true

      - name: Push full closures to Cachix
        run: |
          # Resolve the real store paths (not the ./result symlink)
          RESULT=$(nix path-info .#default)
          SHELL_DRV=$(nix path-info --derivation .#devShells.$(nix eval --raw --impure --expr 'builtins.currentSystem').default)

          echo "=== Runtime closure of t-lang ==="
          # Push the runtime closure of the built output
          nix path-info --recursive "$RESULT" | cachix push rstats-on-nix

          echo "=== Build-time input closure of t-lang ==="
          # Push everything that was needed to *build* t-lang
          # (nativeBuildInputs, buildInputs used only at build time, etc.)
          nix-store --query --requisites "$SHELL_DRV" \
            | grep -v '\.drv$' \
            | cachix push rstats-on-nix

          echo "=== DevShell closure ==="
          nix path-info --recursive ./dev-shell-profile \
            | cachix push rstats-on-nix
