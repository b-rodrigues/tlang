name: Build and Cache
on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 3 * * *' # Every night at 03:00 AM

jobs:
  build:
    strategy:
      matrix:
        system:
          - x86_64-linux
          - aarch64-linux
          - aarch64-darwin
    runs-on: ${{ contains(matrix.system, 'darwin') && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      
      - uses: cachix/cachix-action@v15
        with:
          name: rstats-on-nix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      
      - name: Build T and DevShell, then push to Cachix
        run: |
          # Build default package (T executable)
          nix build .#default --print-build-logs
          
          # Build devShell dependencies and create a GC root via profile
          nix develop .#default --profile dev-shell-profile --command true
          
          # Resolve paths for Cachix
          RESULT_PATH="$(python3 -c 'import os; print(os.path.realpath("result"))')"
          SHELL_PATH="$(python3 -c 'import os; print(os.path.realpath("dev-shell-profile"))')"
          
          echo "Pushing $RESULT_PATH and $SHELL_PATH to Cachix..."
          cachix push rstats-on-nix "$RESULT_PATH" "$SHELL_PATH"
